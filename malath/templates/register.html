{% extends 'base.html' %}

{% block content %}
<section class="login-section">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-lg-6">
                <div class="login-card fade-in-up">
                    <h2 class="login-title">{{ t.create_account }}</h2>
                    <p class="login-subtitle">{{ t.register_subtitle }}</p>

                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label class="form-label">{{ t.full_name }}</label>
                            <div class="input-group custom-input-group">
                                <input type="text" name="full_name" class="form-control" placeholder="{{ t.full_name }}" required>
                                <span class="input-group-text">
                                    <i class="fa-solid fa-id-card"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">{{ t.username }}</label>
                            <div class="input-group custom-input-group">
                                <input type="text" name="username" class="form-control" placeholder="{{ t.username }}" required>
                                <span class="input-group-text">
                                    <i class="fa-solid fa-user"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">{{ t.email }}</label>
                            <div class="input-group custom-input-group">
                                <input type="email" name="email" class="form-control" placeholder="{{ t.email }}" required>
                                <span class="input-group-text">
                                    <i class="fa-solid fa-envelope"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">{{ t.password }}</label>
                            <div class="input-group custom-input-group">
                                <input type="password" name="password" class="form-control" placeholder="{{ t.password }}" required>
                                <span class="input-group-text">
                                    <i class="fa-solid fa-lock"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">{{ t.secure_pin }}</label>
                            <div class="input-group custom-input-group">
                                <input type="password" name="pin" class="form-control" maxlength="6" pattern="\d{6}" placeholder="{{ t.secure_pin }}" required>
                                <span class="input-group-text">
                                    <i class="fa-solid fa-key"></i>
                                </span>
                            </div>
                        </div>

                        <button type="submit" class="btn malath-btn w-100">
                            <i class="fa-solid fa-user-plus me-2"></i>{{ t.register }}
                        </button>
                    </form>

                    <div class="mt-3 text-center">
                        <span class="text-light">{{ t.already_have_account }}</span>
                        <a href="/login?lang={{ lang }}" class="text-success text-decoration-none fw-bold">{{ t.login }}</a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
{% endblock %}
