{% extends 'base.html' %}

{% block title %}{{ status_code }} | {{ t.brand }}{% endblock %}

{% block content %}
<section class="login-section">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-lg-6">
                <div class="login-card fade-in-up text-center">
                    <p class="status-code-label">{{ status_code }}</p>
                    <h1 class="login-title">{{ t.page_error }}</h1>
                    <p class="login-subtitle">{{ message }}</p>
                    <a href="{{ localized_url_for('main.dashboard' if current_user.is_authenticated else 'main.index', lang=lang) }}" class="btn malath-btn">
                        <i class="fa-solid fa-house me-2" aria-hidden="true"></i>{{ t.dashboard if current_user.is_authenticated else t.get_started }}
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
