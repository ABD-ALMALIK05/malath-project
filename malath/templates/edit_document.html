{% extends 'base.html' %}

{% block title %}{{ t.update_document }} | {{ t.brand }}{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="dashboard-panel fade-in-up">
            <h1 class="login-title mb-2">{{ t.update_document }}</h1>
            <p class="login-subtitle">{{ document.original_filename }}</p>

            <form method="POST" aria-label="{{ t.update_document }}" data-prevent-double-submit>
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="title">{{ t.title }}</label>
                        <input type="text" id="title" name="title" class="form-control" value="{{ form_data.title }}" aria-invalid="{{ 'true' if field_errors.title else 'false' }}" aria-describedby="{{ 'title-error' if field_errors.title else '' }}" required>
                        {% if field_errors.title %}
                            <p class="field-error" id="title-error">{{ field_errors.title }}</p>
                        {% endif %}
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="category">{{ t.category }}</label>
                        <select id="category" name="category" class="form-control" required>
                            <option value="government" {% if form_data.category == 'government' %}selected{% endif %}>{{ t.government }}</option>
                            <option value="medical" {% if form_data.category == 'medical' %}selected{% endif %}>{{ t.medical }}</option>
                            <option value="property" {% if form_data.category == 'property' %}selected{% endif %}>{{ t.property }}</option>
                            <option value="personal" {% if form_data.category == 'personal' %}selected{% endif %}>{{ t.personal }}</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="description">{{ t.description }}</label>
                        <textarea id="description" name="description" rows="4" class="form-control">{{ form_data.description }}</textarea>
                    </div>

                    <div class="col-12 mt-3">
                        <button type="submit" class="btn malath-btn" data-loading-text="{{ t.submitting }}">
                            <i class="fa-solid fa-floppy-disk me-2" aria-hidden="true"></i>{{ t.save_changes }}
                        </button>
                        <a href="{{ localized_url_for('documents.documents', lang=lang) }}" class="btn btn-outline-light ms-2">
                            {{ t.documents }}
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
