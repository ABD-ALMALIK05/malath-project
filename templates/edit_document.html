{% extends 'base.html' %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="dashboard-panel fade-in-up">
            <h2 class="login-title mb-2">{{ t.update_document }}</h2>
            <p class="login-subtitle">{{ document.original_filename }}</p>

            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">{{ t.title }}</label>
                        <input type="text" name="title" class="form-control" value="{{ document.title }}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">{{ t.category }}</label>
                        <select name="category" class="form-control" required>
                            <option value="government" {% if document.category == 'government' %}selected{% endif %}>{{ t.government }}</option>
                            <option value="medical" {% if document.category == 'medical' %}selected{% endif %}>{{ t.medical }}</option>
                            <option value="property" {% if document.category == 'property' %}selected{% endif %}>{{ t.property }}</option>
                            <option value="personal" {% if document.category == 'personal' %}selected{% endif %}>{{ t.personal }}</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">{{ t.description }}</label>
                        <textarea name="description" rows="4" class="form-control">{{ document.description or '' }}</textarea>
                    </div>

                    <div class="col-12 mt-3">
                        <button type="submit" class="btn malath-btn">
                            <i class="fa-solid fa-floppy-disk me-2"></i>{{ t.save_changes }}
                        </button>
                        <a href="/documents?lang={{ lang }}" class="btn btn-outline-light ms-2">
                            {{ t.documents }}
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
