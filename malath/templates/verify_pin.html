{% extends 'base.html' %}

{% block title %}{{ t.verify_pin }} | {{ t.brand }}{% endblock %}

{% block content %}
<section class="login-section">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-lg-5">
                <div class="login-card fade-in-up">
                    <h1 class="login-title">{{ t.verify_pin }}</h1>
                    <p class="login-subtitle">{{ t.pin_subtitle }}</p>

                    <form method="POST" action="{{ localized_url_for('auth.verify_pin', next=next_url, lang=lang) }}" aria-label="{{ t.verify_pin }}" data-prevent-double-submit>
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-4">
                            <label class="form-label" for="pin">{{ t.secure_pin }}</label>
                            <div class="input-group custom-input-group">
                                <input type="password" id="pin" name="pin" class="form-control" maxlength="6" inputmode="numeric" pattern="\d{6}" placeholder="{{ t.secure_pin }}" autocomplete="off" aria-invalid="{{ 'true' if field_errors.pin else 'false' }}" aria-describedby="{{ 'pin-error' if field_errors.pin else '' }}" required>
                                <span class="input-group-text">
                                    <i class="fa-solid fa-key" aria-hidden="true"></i>
                                </span>
                            </div>
                            {% if field_errors.pin %}
                                <p class="field-error" id="pin-error">{{ field_errors.pin }}</p>
                            {% endif %}
                        </div>

                        <button type="submit" class="btn malath-btn w-100" data-loading-text="{{ t.submitting }}">
                            <i class="fa-solid fa-shield-halved me-2" aria-hidden="true"></i>{{ t.verify_pin }}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
