{% extends 'base.html' %}

{% block content %}
<section class="login-section">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100 g-4">

            <div class="col-lg-5">
                <div class="login-card fade-in-up">
                    <h2 class="login-title">{{ t.welcome_back }}</h2>
                    <p class="login-subtitle">{{ t.login_subtitle }}</p>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">{{ t.email_or_username }}</label>
                            <div class="input-group custom-input-group">
                                <input type="text" name="identifier" class="form-control" placeholder="{{ t.email_or_username }}" required>
                                <span class="input-group-text">
                                    <i class="fa-solid fa-user"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">{{ t.password }}</label>
                            <div class="input-group custom-input-group">
                                <input type="password" name="password" class="form-control" placeholder="{{ t.password }}" required>
                                <span class="input-group-text">
                                    <i class="fa-solid fa-lock"></i>
                                </span>
                            </div>
                        </div>

                        <button type="submit" class="btn malath-btn w-100">
                            <i class="fa-solid fa-right-to-bracket me-2"></i>{{ t.login }}
                        </button>
                    </form>

                    <div class="mt-3 text-center">
                        <span class="text-light">{{ t.no_account }}</span>
                        <a href="/register?lang={{ lang }}" class="text-success text-decoration-none fw-bold">{{ t.register }}</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-5 d-none d-lg-block">
                <div class="side-visual-card fade-in-right map-card floating-card">
                    <img src="{{ url_for('static', filename='images/' + ('palestine-ar.jpg' if lang == 'ar' else 'palestine-en.jpg')) }}" alt="Palestine" class="side-image">
                    <img src="{{ url_for('static', filename='images/kufiya-corner.png') }}" alt="Kufiya Corner" class="kufiya-corner-overlay">

                    <div class="overlay-text">
                     <h3>{{ t.hero_title }}</h3>
                      <p>{{ t.hero_text }}</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
{% endblock %}
