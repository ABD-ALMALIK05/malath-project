{% extends 'base.html' %}

{% block content %}
<section class="login-section">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-lg-5">
                <div class="login-card fade-in-up">
                    <h2 class="login-title">{{ t.verify_pin }}</h2>
                    <p class="login-subtitle">{{ t.pin_subtitle }}</p>

                    <form method="POST" action="{{ url_for('auth.verify_pin', next=next_url, lang=lang) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-4">
                            <label class="form-label">{{ t.secure_pin }}</label>
                            <div class="input-group custom-input-group">
                                <input type="password" name="pin" class="form-control" maxlength="6" pattern="\d{6}" placeholder="{{ t.secure_pin }}" required>
                                <span class="input-group-text">
                                    <i class="fa-solid fa-key"></i>
                                </span>
                            </div>
                        </div>

                        <button type="submit" class="btn malath-btn w-100">
                            <i class="fa-solid fa-shield-halved me-2"></i>{{ t.verify_pin }}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
